name: Auto-merge claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR and merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"

          # Check if a PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --state open --json number -q '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, merging..."
            PR_NUMBER="$EXISTING_PR"
          else
            echo "Creating PR for $BRANCH -> main"
            PR_URL=$(gh pr create \
              --title "Auto-merge: ${BRANCH}" \
              --body "Automated PR created by GitHub Actions for branch \`${BRANCH}\`." \
              --head "$BRANCH" \
              --base main)
            PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
            echo "Created PR #$PR_NUMBER"
          fi

          # Merge the PR
          gh pr merge "$PR_NUMBER" --merge --admin
          echo "Merged PR #$PR_NUMBER"
