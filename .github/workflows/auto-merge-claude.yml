name: Auto-merge claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR and merge via API
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_URL: ${{ github.api_url }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "Branch : $BRANCH"
          echo "Repo   : $REPO"
          EXISTING=$(curl -sf \
            -H "Authorization: token ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_URL}/repos/${REPO}/pulls?state=open&per_page=100&base=main" \
            | jq -r '.[] | select(.head.ref == "'"$BRANCH"'") | .number' | head -1 || true)
          if [ -n "$EXISTING" ]; then
            echo "Existing open PR #$EXISTING found."
            PR_NUMBER="$EXISTING"
          else
            echo "Creating PR: $BRANCH -> main"
            RESPONSE=$(curl -sf -X POST \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/vnd.github+json" \
              "${API_URL}/repos/${REPO}/pulls" \
              -d '{"title":"Auto-merge: '"$BRANCH"'","body":"Automated PR for branch `'"$BRANCH"'`.","head":"'"$BRANCH"'","base":"main"}')
            PR_NUMBER=$(echo "$RESPONSE" | jq -r '.number')
            echo "Created PR #$PR_NUMBER"
          fi
          echo "Merging PR #$PR_NUMBER..."
          curl -sf -X PUT \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github+json" \
            "${API_URL}/repos/${REPO}/pulls/${PR_NUMBER}/merge" \
            -d '{"merge_method":"merge","commit_message":"Auto-merge '"$BRANCH"' into main"}'
          echo "Done: PR #$PR_NUMBER merged into main."
