name: Auto-merge claude branches

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          BRANCH="${{ github.ref_name }}"
          echo "Branch: $BRANCH"

          # Create PR (will fail if one already exists, that's ok)
          gh pr create \
            --title "Auto-merge: $BRANCH" \
            --body "Automated PR for branch \`$BRANCH\`." \
            --head "$BRANCH" \
            --base main 2>&1 || true

          # Merge the PR for this branch (works with branch name)
          gh pr merge "$BRANCH" --merge --delete-branch=false
          echo "Done: $BRANCH merged into main."
