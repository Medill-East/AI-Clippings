name: Auto-merge claude/* branches into main

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Merge claude branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Retry loop: re-fetch latest main and re-merge on each push failure
          for i in 1 2 3 4; do
            git fetch origin main
            git reset --hard origin/main
            git merge --no-ff -X theirs origin/${{ github.ref_name }} -m "Auto-merge ${{ github.ref_name }} into main"
            git push origin main && break
            if [ $i -lt 4 ]; then
              echo "Push attempt $i failed (concurrent update), retrying in $((i * 2))s..."
              sleep $((i * 2))
            else
              echo "All push attempts failed"
              exit 1
            fi
          done
